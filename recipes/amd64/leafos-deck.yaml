---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: leafos-deck
description: My Custom Build of Universal Blue's Bazzite Image
base-image: ghcr.io/ublue-os/bazzite-deck-gnome
image-version: stable
alt-tags:
  - stable
  - amd64-stable
platforms:
  - linux/amd64
modules:
  - type: files
    files:
      - source: system
        destination: /
  - type: dnf
    install:
      packages:
        - mimalloc
        - gamemode
        - git
  - type: script
    scripts:
      - "build.sh"
    snippets:
      - "dnf install --refresh --enablerepo=cloudflare-warp -y cloudflare-warp"
      - "dnf install --refresh --enablerepo=rpmfusion-free --enablerepo=rpmfusion-nonfree -y kodi"
  - type: signing
