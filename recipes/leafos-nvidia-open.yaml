---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: leafos-nvidia-open
description: My Custom Build of Universal Blue's Bazzite Image
base-image: ghcr.io/ublue-os/bazzite-gnome-nvidia-open
image-version: stable
alt-tags:
  - stable
platforms:
  - linux/amd64
modules:
  - type: files
    files:
      - source: system
        destination: /
  - type: dnf
    install:
      packages:
        - mimalloc
        - gamemode
        - git
  - type: script
    scripts:
      - "build.sh"
    snippets:
      - "dnf install --refresh --enablerepo=cloudflare-warp -y cloudflare-warp"
  - type: signing
