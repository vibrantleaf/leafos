---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: sawfish
description: My Custom Build of Universal Blue's Bluefin LTS Image
base-image: ghcr.io/ublue-os/bluefin
image-version: lts-hwe
alt-tags:
  - stable
  - lts
  - lts-hwe
  - lts-hwe-stable
  - arm64-stable
  - arm64-lts
  - arm64-lts-hwe
  - arm64-lts-hwe-stable
platforms:
  - linux/arm64
modules:
  - type: files
    files:
      - source: system
        destination: /
  - type: dnf
    install:
      packages:
        - mimalloc
        - git
  - type: script
    scripts:
      - "build.sh"
      - "arm64/box64.sh"
    snippets:
      - "dnf install --refresh --enablerepo=cloudflare-warp -y cloudflare-warp"
  - type: default-flatpaks
    configurations:
    - notify: true
      scope: system
      repo:
        title: Flathub (system)
      install: 
        - net.davidotek.pupgui2
  - type: signing
